---
# Play 1 — System prerequisites
- name: System prerequisites
  hosts: k3s
  become: true

  tasks:
    - name: Install required packages
      apt:
        update_cache: yes
        name:
          - curl
          - gnupg
          - apt-transport-https
          - iptables
        state: present

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Load overlay module
      modprobe:
        name: overlay
        state: present

    - name: Persist kernel modules for k3s
      copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          br_netfilter
          overlay

    - name: Configure sysctl for k3s networking
      copy:
        dest: /etc/sysctl.d/99-k3s.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Disable ufw
      command: ufw disable
      become: true


# Play 3 — k3s server (master)
- name: Install k3s server on master
  hosts: master
  become: true

  tasks:
    - name: Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install k3s server
      shell: curl -sfL https://get.k3s.io | sh -s - server
      when: not k3s_binary.stat.exists

    - name: Ensure k3s service is started and enabled
      service:
        name: k3s
        state: started
        enabled: yes

    - name: Wait for node token to be available
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Read node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Set k3s token as fact
      set_fact:
        k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"


# Play 4 — k3s agents (workers)
- name: Install k3s agents on workers
  hosts: workers
  become: true

  tasks:
    - name: Resolve master IP and token from hostvars
      set_fact:
        master_ip: "{{ hostvars[groups['master'][0]]['ansible_host'] | default(hostvars[groups['master'][0]]['inventory_hostname']) }}"
        master_token: "{{ hostvars[groups['master'][0]]['k3s_token'] }}"

    - name: Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install k3s agent
      shell: curl -sfL https://get.k3s.io | sh -s - agent
      environment:
        K3S_URL: "https://{{ master_ip }}:6443"
        K3S_TOKEN: "{{ master_token }}"
      when: not k3s_binary.stat.exists

    - name: Ensure k3s-agent service is started and enabled
      service:
        name: k3s-agent
        state: started
        enabled: yes
