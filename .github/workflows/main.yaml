name: Deploy k3s Cluster to OCI

on:
  push:
    branches:
      - main
    paths:
      - ansible/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: "oci -v"

      - name: Configure OCI CLI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${OCI_USER_OCID}" >> ~/.oci/config
          echo "fingerprint=${OCI_KEY_FINGERPRINT}" >> ~/.oci/config
          echo "tenancy=${OCI_TENANCY_OCID}" >> ~/.oci/config
          echo "region=${OCI_REGION}" >> ~/.oci/config
          echo "${OCI_PRIVATE_KEY}" > ~/.oci/oci_private_key.pem
          chmod 600 ~/.oci/oci_private_key.pem
          echo "key_file=~/.oci/oci_private_key.pem" >> ~/.oci/config
          chmod 600 ~/.oci/config
          echo "Config file created at ~/.oci/config"

      - name: Get public IPs of all running instances
        run: |
          > ansible/hosts.tmp
          oci compute instance list \
            --compartment-id ${{ secrets.OCI_COMPARTMENT_ID }} \
            --all \
            --query "data[?\"lifecycle-state\"=='RUNNING'].id" \
            --raw-output | jq -r '.[]' | while read -r ID; do
              oci compute vnic-attachment list \
                --compartment-id ${{ secrets.OCI_COMPARTMENT_ID }} \
                --instance-id $ID \
                --query "data[].\"vnic-id\"" --raw-output | jq -r '.[]' | while read -r VNIC_ID; do
                  IP=$(oci network vnic get --vnic-id $VNIC_ID \
                    --query "data.\"public-ip\"" --raw-output)
                  echo "$IP" >> ansible/hosts.tmp
              done
          done
          cat ansible/hosts.tmp

      - name: Update Ansible inventory with worker IPs
        run: |
          # Remove old worker IPs in inventory.ini (except the master)
          sed -i.bak '/^\[workers\]/,/^\[/{//!d}' ansible/inventory.ini

          # Append header if missing
          if ! grep -q '^\[workers\]' ansible/inventory.ini; then
            echo '[workers]' >> ansible/inventory.ini
          fi

          # Add new worker IPs from hosts.tmp
          while read -r IP; do
            echo "$IP ansible_ssh_user=ubuntu ansible_ssh_private_key_file=~/.ssh/sacenplastique.key" >> ansible/inventory.ini
          done < ansible/hosts.tmp

      - name: Update Cloudflare DNS Record (first instance only)
        run: |
          FIRST_IP=$(head -n1 ansible/hosts.tmp)
          EXISTING_IP=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/${{ secrets.RECORD_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result.content')

          if [ "$EXISTING_IP" != "$FIRST_IP" ]; then
            curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/${{ secrets.RECORD_ID }}" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"content": "'$FIRST_IP'", "type": "A"}'
          else
            echo "Cloudflare DNS record is already up to date."
          fi

      - name: Generate Ansible inventory
        run: |
          python3 - <<'EOF'
          with open("ansible/hosts.tmp") as f:
              ips = [line.strip() for line in f if line.strip()]

          worker_lines = "\n".join(
              f"{ip} ansible_ssh_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa"
              for ip in ips
          )

          with open("ansible/inventory_template.ini") as f:
              template = f.read()

          inventory = template.replace("__OCI_WORKERS__", worker_lines)

          with open("ansible/inventory.ini", "w") as f:
              f.write(inventory)

          print(inventory)
          EOF

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.MASTER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_elitedesk
          chmod 600 ~/.ssh/id_ed25519_elitedesk
          ssh-keyscan -p 22 -H sacenpapier.org >> ~/.ssh/known_hosts
          for IP in $(cat ansible/hosts.tmp); do
            ssh-keyscan -H "$IP" >> ~/.ssh/known_hosts
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
            --extra-vars "tailscale_auth_key=${{ secrets.TAILSCALE_AUTH_KEY }}"
